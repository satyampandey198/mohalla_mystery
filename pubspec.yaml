name: mohalla_mystery
description: Desi Horror Mystery Puzzle Game - Mohalla Mystery

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Ads
  google_mobile_ads: ^5.1.0

  # Audio
  audioplayers: ^6.0.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  firebase_core: ^3.1.0
  cloud_firestore: ^5.1.0
  firebase_auth: ^5.1.0

  # Utils
  vibration: ^2.0.0
  translator: ^1.0.4+1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/data/

  # Fonts are managed via google_fonts package.
  # If you want to use local fonts, ensure the .ttf files exist in assets/fonts/
  # fonts:
  #   - family: HindDevanagari
  #     fonts:
  #       - asset: assets/fonts/HindDevanagari-Regular.ttf
  #       - asset: assets/fonts/HindDevanagari-Bold.ttf
  #         weight: 700
